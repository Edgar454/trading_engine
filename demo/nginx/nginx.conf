# ================================
# Nginx Demo Reverse Proxy Config
# ================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # -------------------------------
    # Rate limiting
    # -------------------------------
    # 10 requests per second per IP, burst 20
    limit_req_zone $binary_remote_addr zone=demo_limit:10m rate=10r/s;

    # -------------------------------
    # Upstreams
    # -------------------------------
    upstream nifi_backend {
        server nifi:8443;
    }

    upstream grafana {
        server grafana:3000;
    }

    # -------------------------------
    # NiFi Server (HTTP -> HTTPS via proxy)
    # -------------------------------
    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=30s;

        proxy_ssl_certificate /certs/nginx/demo.crt;
        proxy_ssl_certificate_key /certs/nginx/demo.key;
        proxy_ssl_trusted_certificate /certs/nginx/ca.pem;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_server_name on;
        proxy_ssl_name nifi;

        # Handle NiFi redirects
        proxy_redirect https://nifi:8443/ /;
        proxy_redirect https://nifi/ /;

        # -------------------------------
        # Root path 
        # -------------------------------
        location = / {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/;
            proxy_set_header Host nifi:8443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        # NiFi UI
        location /nifi/ {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/nifi/;
            proxy_set_header Host nifi:8443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        # NiFi API
        location /nifi-api/ {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/nifi-api/;
            proxy_set_header Host nifi:8443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        # Static content
        location /nifi/static/ {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/nifi/static/;
            proxy_set_header Host nifi:8443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        # WebSockets
        location /nifi-api/websocket {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/nifi-api/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host nifi:8443;
        }

        # Catch-all for safety
        location / {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass https://nifi_backend/;
            proxy_set_header Host nifi:8443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }
    }

    # -------------------------------
    # Grafana Server (HTTP)
    # -------------------------------
    # Extract CN from client cert for future mTLS (demo only)
    map $ssl_client_s_dn $username {
        default "";
        ~CN=([^,]+) $1;
    }

    server {
        listen 90;
        server_name localhost;

        location / {
            limit_req zone=demo_limit burst=20 nodelay;
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-WEBAUTH-USER "demo";  
        }
    }

    # -------------------------------
    # Optional: Timeouts
    # -------------------------------
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}