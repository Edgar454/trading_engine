worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream nifi_backend {
        server nifi:8443;
    }

    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=30s;
        
        proxy_ssl_certificate /certs/nginx/server.crt;
        proxy_ssl_certificate_key /certs/nginx/server.key;
        proxy_ssl_trusted_certificate /certs/nginx/ca.pem;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_server_name on;
        proxy_ssl_name nifi;  # This works as shown by curl
        
        # CRITICAL FIX: Handle redirects properly
        proxy_redirect https://nifi:8443/ /;
        proxy_redirect https://nifi/ /;
        
        # Host header - use the service name that works
        proxy_set_header Host nifi:8443;
        
        # Standard headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Buffer settings
        proxy_buffering off;
        proxy_http_version 1.1;
        
        # Handle root path redirect to /nifi/
        location = / {
            proxy_pass https://nifi_backend/;
            proxy_set_header Host nifi:8443;
        }
        
        # Main location - serve NiFi UI
        location /nifi/ {
            proxy_pass https://nifi_backend/nifi/;
            proxy_set_header Host nifi:8443;
        }
        
        # API endpoints
        location /nifi-api/ {
            proxy_pass https://nifi_backend/nifi-api/;
            proxy_set_header Host nifi:8443;
        }
        
        # Static content
        location /nifi/static/ {
            proxy_pass https://nifi_backend/nifi/static/;
            proxy_set_header Host nifi:8443;
        }
        
        # WebSocket support
        location /nifi-api/websocket {
            proxy_pass https://nifi_backend/nifi-api/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host nifi:8443;
        }
        
        # Catch-all to handle any other paths
        location / {
            proxy_pass https://nifi_backend;
            proxy_set_header Host nifi:8443;
        }
    }

    #================ nifi registry configuration =========
    upstream nifi_registry_backend {
        server nifi-registry:18443;
    }

    server {
        listen 81;
        server_name localhost;

        resolver 127.0.0.11 valid=30s;
        
        proxy_ssl_certificate /certs/nginx/server.crt;
        proxy_ssl_certificate_key /certs/nginx/server.key;
        proxy_ssl_trusted_certificate /certs/nginx/ca.pem;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_server_name on;
        proxy_ssl_name nifi-registry;  # Fixed: use actual service name
        
        # CRITICAL: Add TLS protocol settings
        proxy_ssl_protocols TLSv1.2 TLSv1.3;  # Allow both
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;    # Secure ciphers
        
        # Host header - fix this
        proxy_set_header Host nifi-registry:18443;  # Fixed service name
        
        # Standard headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Buffer settings
        proxy_buffering off;
        proxy_http_version 1.1;
        
        # Handle root path
        location = / {
            proxy_pass https://nifi_registry_backend/;
            proxy_set_header Host nifi-registry:18443;
        }
        
        # Main location - serve NiFi Registry UI (note: different path)
        location /nifi-registry/ {
            proxy_pass https://nifi_registry_backend/nifi-registry/;
            proxy_set_header Host nifi-registry:18443;
        }
        
        # API endpoints (registry uses different API path)
        location /nifi-registry-api/ {
            proxy_pass https://nifi_registry_backend/nifi-registry-api/;
            proxy_set_header Host nifi-registry:18443;
        }
        
        # Swagger UI (if needed)
        location /swagger/ {
            proxy_pass https://nifi_registry_backend/swagger/;
            proxy_set_header Host nifi-registry:18443;
        }
        
        # Catch-all
        location / {
            proxy_pass https://nifi_registry_backend;
            proxy_set_header Host nifi-registry:18443;
        }
    }

    # ======== postgres exporter configuration ========
    upstream postgres_exporter_backend {
        server postgres-exporter:9187;
    }

    server {
        listen 445 ssl;
        server_name localhost;

        ssl_certificate /certs/postgres-exporter/server.crt;
        ssl_certificate_key /certs/postgres-exporter/server.key;
        ssl_client_certificate /certs/postgres-exporter/ca.crt;  
        ssl_verify_client on; 

        location /metrics {
            proxy_pass http://postgres_exporter_backend/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    #=============== grafana configuration ===============
    upstream grafana {
        server grafana:3000;
    }

    # Extract CN for auth proxy
    map $ssl_client_s_dn $username {
            default "";
            ~CN=([^,]+) $1;
    }

    server {
        listen 90;  # HTTP for the browser
        server_name localhost;

        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-WEBAUTH-USER "default_user";  # Fallback username for non-mTLS clients
        }
    }

    server {
        listen 444 ssl;
        server_name grafana.trading.local;

        # Server certificates
        ssl_certificate /certs/grafana/server.crt;
        ssl_certificate_key /certs/grafana/server.key;

        # Client certificate verification (mTLS for internal services)
        ssl_client_certificate /certs/grafana/ca.pem;
        ssl_verify_client on;
        ssl_verify_depth 2;



        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CRITICAL: Forward username to Grafana
            proxy_set_header X-WEBAUTH-USER $username;
        }
    }
}