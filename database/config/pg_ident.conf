# timescaledb/config/pg_ident.conf

# MAPNAME           CERTIFICATE-CN                      DATABASE-USER
# ========================================================================

# Map NSE Pipeline certificate to pipeline_service user
cert-mapping        nifi-client.trading.local        nifi_user
cert-mapping        postgres-exporter.trading.local        postgres_exporter

# Map TimescaleDB certificate to admin (for admin tasks)
cert-mapping        postgres.trading.local         edgar

