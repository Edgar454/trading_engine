# ===============================================================
# pg_hba.conf - Strict Access (Recommended for Production)
# ===============================================================

# ONLY these two users can connect via SSL with certificates
hostssl trading    nifi_user     0.0.0.0/0   cert clientcert=verify-full map=cert-mapping
hostssl trading    nifi_user     ::/0        cert clientcert=verify-full map=cert-mapping
hostssl trading    edgar         0.0.0.0/0   cert clientcert=verify-full map=cert-mapping
hostssl trading    edgar         ::/0        cert clientcert=verify-full map=cert-mapping
hostssl trading    postgres_exporter 0.0.0.0/0   cert clientcert=verify-full map=cert-mapping
hostssl trading    postgres_exporter ::/0        cert clientcert=verify-full map=cert-mapping
hostssl postgres    postgres_exporter 0.0.0.0/0   cert clientcert=verify-full map=cert-mapping
hostssl postgres    postgres_exporter ::/0        cert clientcert=verify-full map=cert-mapping

# Local admin access
local   all       postgres       peer
local   all        +admin        md5

# Reject EVERYTHING else
hostssl all        all           0.0.0.0/0   reject
hostssl all        all           ::/0        reject
hostnossl all      all           0.0.0.0/0   reject
hostnossl all      all           ::/0        reject